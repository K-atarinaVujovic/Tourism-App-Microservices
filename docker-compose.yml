version: "3.8"

services:
  blogs:
    build:
      context: ./Blog
      dockerfile: Dockerfile
    image: blogs:latest
    container_name: blogs
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://blog-db:5432/blogdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - blog-db
    networks:
      - app-network

  blog-db:
    image: postgres:16
    container_name: blog-db
    restart: always
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - blog-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  gateway:
    build:
      context: .
      dockerfile: ./Gateway/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - app-network
    environment:
      JWT_SECRET: super-secret-change-me

volumes:
  blog-db-data:

networks:
  app-network:
    driver: bridge